<!-- frontend/index.html -->
<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Dane z API</title>
</head>
<body>
  <h1>Dane z czujnika</h1>
  <pre id="output">Ładowanie danych...</pre>

  <script>
    fetch('https://TWÓJ_BACKEND.azurewebsites.net/data')
      .then(res => res.json())
      .then(data => {
        document.getElementById('output').textContent = JSON.stringify(data, null, 2);
      })
      .catch(err => {
        document.getElementById('output').textContent = 'Błąd: ' + err;
      });
  </script>
</body>
</html>
